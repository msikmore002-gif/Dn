<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una pregunta para ti ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

#si{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:relative;
}
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Tengo una pregunta ❤️</h1>
    <h2>¿Te gustaría salir conmigo?</h2>

    <button id="si" onclick="acepto()">Sí</button>
    <button id="no" onmouseover="moverNo()">No</button>

    <p id="mensaje"></p>
</div>

<script>
function acepto(){
    document.getElementById("mensaje").innerHTML =
    "🥰 ¡Genial! Ahora ya tenemos una cita.";
}

function moverNo(){
    const btn = document.getElementById("no");

    const x = Math.random() * 300 - 150;
    const y = Math.random() * 150 - 75;

    btn.style.transform = `translate(${x}px, ${y}px)`;
}
</script>

</body>
</html>
